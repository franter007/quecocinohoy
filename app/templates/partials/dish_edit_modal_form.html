<form action="{{ action }}" method="post" class="row g-3" data-dish-edit-form>
  <input type="hidden" name="next" value="{{ next_url }}">

  <div class="col-md-8">
    <label class="form-label">Nombre</label>
    <input class="form-control" type="text" name="name" value="{{ dish.name }}" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Tipo</label>
    <select class="form-select" name="meal_type" required>
      {% for mt in meal_types %}
      <option value="{{ mt }}" {% if dish.meal_type == mt %}selected{% endif %}>{{ meal_labels[mt] }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="col-md-4">
    <label class="form-label">Costo por porcion (S/)</label>
    <input class="form-control" type="number" step="0.01" min="0" name="cost_per_serving" value="{{ dish.cost_per_serving }}" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Calorias</label>
    <input class="form-control" type="number" min="0" name="calories" value="{{ dish.calories }}" required>
  </div>
  <div class="col-md-4 d-flex align-items-end">
    <label class="form-check mb-2">
      <input class="form-check-input" type="checkbox" name="is_active" {% if dish.is_active %}checked{% endif %}>
      <span class="form-check-label">Activo</span>
    </label>
  </div>

  <div class="col-12">
    <label class="form-label">Ingredientes</label>
    <textarea class="form-control" name="ingredients" rows="2" required>{{ dish.ingredients }}</textarea>
  </div>

  <div class="col-md-3">
    <label class="form-label">Proteina (g)</label>
    <input class="form-control" type="number" step="0.1" min="0" name="protein_g" value="{{ dish.protein_g }}">
  </div>
  <div class="col-md-3">
    <label class="form-label">Carbohidratos (g)</label>
    <input class="form-control" type="number" step="0.1" min="0" name="carbs_g" value="{{ dish.carbs_g }}">
  </div>
  <div class="col-md-2">
    <label class="form-label">Grasa (g)</label>
    <input class="form-control" type="number" step="0.1" min="0" name="fat_g" value="{{ dish.fat_g }}">
  </div>
  <div class="col-md-2">
    <label class="form-label">Fibra (g)</label>
    <input class="form-control" type="number" step="0.1" min="0" name="fiber_g" value="{{ dish.fiber_g }}">
  </div>
  <div class="col-md-2">
    <label class="form-label">Azucar (g)</label>
    <input class="form-control" type="number" step="0.1" min="0" name="sugar_g" value="{{ dish.sugar_g }}">
  </div>
  <div class="col-md-3">
    <label class="form-label">Sodio (mg)</label>
    <input class="form-control" type="number" step="0.1" min="0" name="sodium_mg" value="{{ dish.sodium_mg }}">
  </div>
  <div class="col-md-9">
    <label class="form-label">Beneficios (opcional)</label>
    <textarea class="form-control" name="benefits" rows="1">{{ dish.benefits }}</textarea>
  </div>
  <div class="col-12">
    <label class="form-label">Advertencias/perjuicios (opcional)</label>
    <textarea class="form-control" name="warnings" rows="2">{{ dish.warnings }}</textarea>
  </div>

  <div class="col-12 d-flex flex-wrap gap-2">
    <button class="btn btn-primary" type="submit">Guardar cambios</button>
    <a class="btn btn-outline-secondary" href="{{ full_edit_url }}">Abrir formulario completo</a>
  </div>
</form>
