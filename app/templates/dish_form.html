{% extends "base.html" %}
{% block content %}
<section class="mb-3 d-flex justify-content-between align-items-center">
  <div>
    <h1 class="h3 mb-1">{{ title }}</h1>
    <p class="text-muted mb-0">Completa datos de costo y valor nutricional del plato.</p>
  </div>
  <a class="btn btn-outline-secondary" href="{{ next_url or '/dishes' }}">Volver</a>
</section>

<section class="card shadow-sm">
  <div class="card-body">
    <form action="{{ action }}" method="post" class="row g-3">
      <input type="hidden" name="next" value="{{ next_url or '/dishes' }}">
      <div class="col-md-6">
        <label class="form-label">Nombre</label>
        <input class="form-control" type="text" name="name" value="{{ dish.name if dish else '' }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Tipo</label>
        <select class="form-select" name="meal_type" required>
          {% for mt in meal_types %}
          <option value="{{ mt }}" {% if dish and dish.meal_type == mt %}selected{% endif %}>{{ meal_labels[mt] }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Costo por porcion (S/)</label>
        <input class="form-control" type="number" step="0.01" min="0" name="cost_per_serving" value="{{ dish.cost_per_serving if dish else '' }}" required>
      </div>

      <div class="col-12">
        <label class="form-label">Ingredientes (separados por coma)</label>
        <textarea class="form-control" name="ingredients" rows="2" required>{{ dish.ingredients if dish else '' }}</textarea>
      </div>

      <div class="col-md-2">
        <label class="form-label">Calorias</label>
        <input class="form-control" type="number" min="0" name="calories" value="{{ dish.calories if dish else '' }}" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Proteina (g)</label>
        <input class="form-control" type="number" step="0.1" min="0" name="protein_g" value="{{ dish.protein_g if dish else 0 }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">Carbohidratos (g)</label>
        <input class="form-control" type="number" step="0.1" min="0" name="carbs_g" value="{{ dish.carbs_g if dish else 0 }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">Grasa (g)</label>
        <input class="form-control" type="number" step="0.1" min="0" name="fat_g" value="{{ dish.fat_g if dish else 0 }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">Fibra (g)</label>
        <input class="form-control" type="number" step="0.1" min="0" name="fiber_g" value="{{ dish.fiber_g if dish else 0 }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">Azucar (g)</label>
        <input class="form-control" type="number" step="0.1" min="0" name="sugar_g" value="{{ dish.sugar_g if dish else 0 }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">Sodio (mg)</label>
        <input class="form-control" type="number" step="0.1" min="0" name="sodium_mg" value="{{ dish.sodium_mg if dish else 0 }}">
      </div>

      <div class="col-md-5">
        <label class="form-label">Beneficios (opcional)</label>
        <textarea class="form-control" name="benefits" rows="2">{{ dish.benefits if dish else '' }}</textarea>
      </div>
      <div class="col-md-5">
        <label class="form-label">Advertencias/perjuicios (opcional)</label>
        <textarea class="form-control" name="warnings" rows="2">{{ dish.warnings if dish else '' }}</textarea>
      </div>
      <div class="col-md-2 d-flex align-items-center">
        <label class="form-check mt-3">
          <input class="form-check-input" type="checkbox" name="is_active" {% if not dish or dish.is_active %}checked{% endif %}>
          <span class="form-check-label">Activo</span>
        </label>
      </div>

      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary" type="submit">Guardar</button>
        <a class="btn btn-outline-secondary" href="{{ next_url or '/dishes' }}">Cancelar</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
